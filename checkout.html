<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander — Mataio Vanille</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/checkout.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="vn-nature"></div>
  <div id="navbar-root"></div>

  <!-- ÉTAPES -->
  <div class="checkout-steps">
    <div class="step active" id="step-indicator-1">
      <div class="step-circle">1</div>
      <span>Livraison</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step-indicator-2">
      <div class="step-circle">2</div>
      <span>Paiement Stripe</span>
    </div>
  </div>

  <!-- CONTENU CHECKOUT -->
  <div class="checkout-layout">

    <!-- FORMULAIRES -->
    <div class="checkout-forms">

      <!-- ÉTAPE 1 : LIVRAISON -->
      <div id="formStep1">
        <h2 class="form-title">Informations de livraison</h2>
        <form id="deliveryForm" onsubmit="goToStripe(event)">
          <div class="form-row">
            <div class="form-group">
              <label>Prénom *</label>
              <input type="text" id="firstName" placeholder="Marie" required />
            </div>
            <div class="form-group">
              <label>Nom *</label>
              <input type="text" id="lastName" placeholder="Dupont" required />
            </div>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" placeholder="marie@exemple.fr" required />
          </div>
          <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" id="phone" placeholder="+33 6 12 34 56 78" />
          </div>
          <div class="form-group">
            <label>Adresse *</label>
            <input type="text" id="address" placeholder="12 rue de la Paix" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Code postal *</label>
              <input type="text" id="postal" placeholder="75001" required />
            </div>
            <div class="form-group">
              <label>Ville *</label>
              <input type="text" id="city" placeholder="Paris" required />
            </div>
          </div>
          <div class="form-group">
            <label>Pays</label>
            <select id="country">
              <option value="FR">France</option>
              <option value="BE">Belgique</option>
              <option value="CH">Suisse</option>
              <option value="LU">Luxembourg</option>
            </select>
          </div>

          <h3 class="form-subtitle">Mode de livraison</h3>
          <div class="shipping-options">
            <label class="shipping-option selected" id="ship-standard">
              <input type="radio" name="shipping" value="standard" checked onchange="updateShipping(this)" />
              <div class="shipping-option-info">
                <div class="shipping-name">Livraison standard</div>
                <div class="shipping-delay">3-5 jours ouvrés</div>
              </div>
              <div class="shipping-price">Gratuit</div>
            </label>
            <label class="shipping-option" id="ship-express">
              <input type="radio" name="shipping" value="express" onchange="updateShipping(this)" />
              <div class="shipping-option-info">
                <div class="shipping-name">Livraison express</div>
                <div class="shipping-delay">24-48h</div>
              </div>
              <div class="shipping-price">4,90 €</div>
            </label>
          </div>

          <button type="submit" class="btn-primary btn-full btn-next">Payer en sécurité →</button>
        </form>
      </div>

    </div>

    <!-- RÉCAPITULATIF COMMANDE -->
    <aside class="order-summary" id="orderSummary">
      <h3>Récapitulatif</h3>
      <div class="currency-bar" style="margin-bottom:16px;">
        <span class="currency-label">Devise :</span>
        <div class="currency-switcher">
          <button class="currency-btn" data-currency="XPF" onclick="setCurrency('XPF')">XPF</button>
          <button class="currency-btn" data-currency="EUR" onclick="setCurrency('EUR')">EUR</button>
          <button class="currency-btn" data-currency="USD" onclick="setCurrency('USD')">USD</button>
        </div>
      </div>
      <div class="summary-items" id="summaryItems"></div>
      <div class="summary-line">
        <span>Sous-total</span>
        <span id="summarySubtotal"></span>
      </div>
      <div class="summary-line" id="summaryShippingLine">
        <span>Livraison</span>
        <span id="summaryShipping">Gratuit</span>
      </div>
      <div class="summary-total">
        <span>Total</span>
        <span id="summaryTotal"></span>
      </div>
      <div class="summary-secure">
        Paiement 100% sécurisé<br/>
        Produits 100% naturels<br/>
        Expédition sous 48h
      </div>
    </aside>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/shared.js"></script>
  <script>initNavbar('checkout');</script>
  <script src="js/checkout.js"></script>
</body>
</html>
